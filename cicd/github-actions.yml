name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t nginx-app .

    - name: Run Tests
      run: echo "Running tests..."

    - name: Deploy
      run: echo "Deploying application..."